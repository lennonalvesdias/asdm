name: fullstack-engineer
description: "Full-stack web development profile"
extends:
  - base

agents:
  - code-reviewer
  - documentation-writer
  - architect
  - test-engineer

skills:
  - plan-protocol
  - code-review
  - frontend-design
  - api-design

commands:
  - check-file
  - summarize
  - generate-types
  - scaffold-component

providers:
  - opencode
  - claude-code
  - copilot

provider_config:
  opencode:
    theme: dark
  claude-code:
    permissions:
      allow:
        - "Read(**)"
        - "Write(src/**)"
        - "Bash(npm test)"
        - "Bash(npm run build)"
