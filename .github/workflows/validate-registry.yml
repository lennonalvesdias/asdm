name: Validate Registry

on:
  push:
    branches:
      - main
    paths:
      - 'registry/**'
      - 'cli/schemas/**'
      - 'cli/scripts/**'
      - '.github/workflows/validate-registry.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Registry Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
        working-directory: cli
      - name: Build manifest
        run: npm run build:manifest
        working-directory: cli
      - name: Validate registry
        run: npm run validate:registry
        working-directory: cli
      - name: Check for uncommitted manifest changes
        run: |
          if ! git diff --exit-code registry/; then
            echo "Registry manifest is out of date. Run 'npm run build:manifest' and commit the result."
            exit 1
          fi
