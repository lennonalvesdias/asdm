name: Update Cargo Dependencies

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cargo-update:
    name: cargo update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo update
        working-directory: cockpit/src-tauri
        run: cargo update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet cockpit/src-tauri/Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated Cargo.lock
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cockpit/src-tauri/Cargo.lock
          git commit -m "chore(deps): cargo update

Automated weekly update of Cargo.lock to resolve security advisories.

Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin main
