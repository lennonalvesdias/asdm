name: Update Cargo Dependencies

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cargo-update:
    name: cargo update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo update
        working-directory: cockpit/src-tauri
        run: cargo update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet cockpit/src-tauri/Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): cargo update'
          title: 'chore(deps): cargo update'
          body: |
            Automated `cargo update` to pull in the latest compatible patch/minor versions of all Rust dependencies.

            This helps keep Dependabot security alerts resolved.
          branch: cargo-update/automated
          delete-branch: true
          labels: dependencies
